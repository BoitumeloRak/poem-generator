<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>AI French Poem Generator</title>
</head>
<body>
    <div class="">
        <header>
            <h1>AI French Poem Generator</h1>
        </header>

        <main>
            <form>
                <input 
                    type="text" 
                    placeholder="Enter the topic of the French poem" 
                    autofocus
                    required
                    autocomplete="off"
                    class="instructions"
                />
                <input type="submit" class="button"/>
            </form>

            <div class="poem">
                La tombe dit a la rose:
                <br />
                - Des pleurs dont l'aube t'arrose
            </div>
        </main>
        


        <footer>This AI project was coded by
            <a href="https://github.com/BoitumeloRak" target="_blank">Boitumelo Rakgole </a> and is
            
            <a href="https://github.com/BoitumeloRak/poem-generator" target="_blank">open-sourced on GitHub</a>
            and is 
            <a href="https://poem-gen-ai.netlify.app/" target="_blank">hosted on Netlify</a>
            
            </footer>
    
        <script src="index.js"></script>
    
    </div>
</body>
</html>
